# lefthook configuration
# Extends any existing pre-push and pre-commit hooks.
# Docs: https://github.com/evilmartians/lefthook

pre-push:
  parallel: true
  commands:
    gherkin-gate:
      run: bash scripts/sdlc/spec-kit-gate.sh
      fail_text: "Gherkin gate failed — story files must contain Scenario: blocks."

    feature-frontmatter:
      run: |
        STORIES=$(find docs/stories -name "*.md" ! -name "_template.md" 2>/dev/null || true)
        [ -z "$STORIES" ] && exit 0
        bash scripts/sdlc/validate-frontmatter.sh $STORIES
      fail_text: "Story frontmatter invalid — check required fields."

    design-approved:
      run: |
        STORIES=$(find docs/stories -name "*.md" ! -name "_template.md" 2>/dev/null || true)
        [ -z "$STORIES" ] && exit 0
        bash scripts/sdlc/design-approved-gate.sh $STORIES
      fail_text: "Design gate failed — wireframe or mockup not approved for ui:true story."

    a11y-required:
      run: |
        STORIES=$(find docs/stories -name "*.md" ! -name "_template.md" 2>/dev/null || true)
        [ -z "$STORIES" ] && exit 0
        bash scripts/sdlc/a11y-gate.sh $STORIES
      fail_text: "A11y gate failed — WCAG 2.2 AA audit not passed for ui:true story."

    adr-required:
      run: bash scripts/sdlc/adr-required-gate.sh
      fail_text: "ADR gate failed — story has adr_required: true but no ADR file found in docs/architecture/."

pre-commit:
  parallel: true
  commands:
    no-secrets:
      run: git diff --cached --name-only | xargs grep -lE "(API_KEY|SECRET|PASSWORD|TOKEN)\s*=\s*['\"][^'\"]{8,}" 2>/dev/null && echo "SECRETS FOUND" && exit 1 || exit 0
      fail_text: "Possible secrets staged — review before committing."

post-merge:
  commands:
    rotate-logs:
      run: bash scripts/sdlc/rotate-logs.sh
