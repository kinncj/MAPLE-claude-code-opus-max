<!DOCTYPE html>
<!-- High-fidelity mockup for story folders-001 — TODO SPA Folders feature.
     Self-contained, token-driven, theme-switchable. Derived from the approved wireframe.
     status: approved -->
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TODO — Folders (mockup)</title>
  <style>
    :root, [data-theme="light"]{
      --color-bg:#f1f5f9; --color-surface:#fff; --color-surface-alt:#f8fafc; --color-border:#e2e8f0;
      --color-text:#0f172a; --color-text-muted:#475569; --color-accent:#2563eb; --color-accent-hover:#1d4ed8;
      --color-accent-soft:#eff6ff; --color-danger:#dc2626; --color-danger-soft:#fef2f2; --color-success:#16a34a;
      --color-star:#f59e0b; --color-focus-ring:#2563eb;
      --shadow-md:0 4px 12px 0 rgba(15,23,42,.10);
    }
    [data-theme="dark"]{
      --color-bg:#0f172a; --color-surface:#1e293b; --color-surface-alt:#172033; --color-border:#334155;
      --color-text:#f1f5f9; --color-text-muted:#94a3b8; --color-accent:#60a5fa; --color-accent-hover:#93c5fd;
      --color-accent-soft:#1e3a5f; --color-danger:#f87171; --color-danger-soft:#3b1f22; --color-success:#4ade80;
      --color-star:#fbbf24; --color-focus-ring:#60a5fa;
      --shadow-md:0 4px 12px 0 rgba(0,0,0,.45);
    }
    *{box-sizing:border-box}
    body{margin:0;background:var(--color-bg);color:var(--color-text);
      font-family:'Inter',ui-sans-serif,system-ui,'Segoe UI',Roboto,sans-serif;}
    .app{max-width:920px;margin:32px auto;background:var(--color-surface);border:1px solid var(--color-border);
      border-radius:16px;box-shadow:var(--shadow-md);overflow:hidden}
    header{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid var(--color-border)}
    header h1{margin:0;font-size:1.75rem;font-weight:700}
    .theme-btn{border:1px solid var(--color-border);background:var(--color-surface-alt);color:var(--color-text);
      border-radius:9999px;width:44px;height:44px;font-size:18px;cursor:pointer}
    .grid{display:grid;grid-template-columns:248px 1fr;gap:0}
    aside{border-right:1px solid var(--color-border);padding:18px;display:flex;flex-direction:column;min-height:460px}
    aside h2{font-size:.8rem;text-transform:uppercase;letter-spacing:.06em;color:var(--color-text-muted);margin:0 0 12px}
    .folder{display:flex;justify-content:space-between;align-items:center;width:100%;text-align:left;
      border:none;background:none;color:var(--color-text);font:inherit;padding:9px 12px;border-radius:10px;cursor:pointer}
    .folder:hover{background:var(--color-surface-alt)}
    .folder.active{background:var(--color-accent-soft);color:var(--color-accent);font-weight:600}
    .folder .star{color:var(--color-star);margin-right:6px}
    .folder .badge{color:var(--color-text-muted);font-size:.85rem}
    .folder.active .badge{color:var(--color-accent)}
    .spacer{flex:1}
    .side-btn{border:1px dashed var(--color-border);background:none;color:var(--color-text);font:inherit;
      padding:10px;border-radius:10px;cursor:pointer;margin-top:10px;width:100%}
    main{padding:18px 22px;display:flex;flex-direction:column;gap:14px}
    .addrow{display:flex;gap:10px}
    .addrow input{flex:1;border:1px solid var(--color-border);background:var(--color-surface-alt);color:var(--color-text);
      border-radius:12px;padding:12px 14px;font:inherit}
    .addrow input::placeholder{color:var(--color-text-muted)}
    .plus{border:none;background:var(--color-accent);color:#fff;border-radius:12px;width:48px;font-size:20px;cursor:pointer}
    .toolbar{display:flex;align-items:center;gap:8px}
    .pills{display:inline-flex;gap:6px;background:var(--color-surface-alt);padding:4px;border-radius:9999px}
    .pill{border:none;background:none;color:var(--color-text-muted);font:inherit;font-weight:600;
      padding:5px 14px;border-radius:9999px;cursor:pointer}
    .pill[aria-checked="true"]{background:var(--color-surface);color:var(--color-accent);box-shadow:var(--shadow-md)}
    .del-folder{margin-left:auto;border:1px solid var(--color-border);background:none;color:var(--color-danger);
      font:inherit;padding:6px 12px;border-radius:10px;cursor:pointer}
    .list{border:1px solid var(--color-border);border-radius:14px;padding:8px;min-height:230px}
    .task{display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:10px}
    .task:hover{background:var(--color-surface-alt)}
    .task input[type=checkbox]{width:18px;height:18px;accent-color:var(--color-accent)}
    .task .title{flex:1}
    .task.done .title{text-decoration:line-through;color:var(--color-text-muted)}
    .task .ftag{font-size:.72rem;color:var(--color-text-muted);border:1px solid var(--color-border);border-radius:9999px;padding:1px 8px}
    .del{border:none;background:none;color:var(--color-danger);cursor:pointer;font:inherit;font-size:.8rem;font-weight:600}
    .confirm{margin-top:8px;background:var(--color-danger-soft);border:1px solid var(--color-danger);border-radius:12px;
      padding:12px 14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;color:var(--color-danger)}
    .confirm .grow{flex:1}
    .confirm button{border:1px solid var(--color-danger);border-radius:8px;padding:5px 12px;font:inherit;cursor:pointer;background:var(--color-surface)}
    .confirm .danger{background:var(--color-danger);color:#fff;border-color:var(--color-danger)}
    .empty{color:var(--color-text-muted);text-align:center;padding:40px 0}
    :focus-visible{outline:2px solid var(--color-focus-ring);outline-offset:2px}
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>Tasks</h1>
      <button class="theme-btn" aria-label="Toggle dark theme" aria-pressed="false"
              onclick="(function(b){var d=document.documentElement;var dark=d.getAttribute('data-theme')==='dark';d.setAttribute('data-theme',dark?'light':'dark');b.setAttribute('aria-pressed',String(!dark));b.textContent=dark?'☀':'☾';})(this)">☀</button>
    </header>
    <div class="grid">
      <aside aria-label="Folders">
        <h2>Folders</h2>
        <button class="folder active" aria-current="true"><span><span class="star" aria-hidden="true">★</span>General</span><span class="badge">3</span></button>
        <button class="folder"><span>Work</span><span class="badge">1</span></button>
        <button class="folder"><span>Groceries</span><span class="badge">2</span></button>
        <div class="spacer"></div>
        <button class="side-btn">+ New folder</button>
        <button class="side-btn">▼ All folders</button>
      </aside>
      <main>
        <div class="addrow">
          <input type="text" placeholder="Add new task in General …" aria-label="Add new task in General" />
          <button class="plus" aria-label="Add task">+</button>
        </div>
        <div class="toolbar" role="radiogroup" aria-label="Filter tasks">
          <div class="pills">
            <button class="pill" role="radio" aria-checked="true">All</button>
            <button class="pill" role="radio" aria-checked="false">Todo</button>
            <button class="pill" role="radio" aria-checked="false">Done</button>
          </div>
          <button class="del-folder">Delete folder</button>
        </div>
        <div class="list">
          <div class="task"><input type="checkbox" aria-label="Mark Buy milk done"><span class="title">Buy milk</span><button class="del" aria-label="Delete Buy milk">Del</button></div>
          <div class="task done"><input type="checkbox" checked aria-label="Mark Walk dog done"><span class="title">Walk dog</span><button class="del" aria-label="Delete Walk dog">Del</button></div>
          <div class="task"><input type="checkbox" aria-label="Mark Write report done"><span class="title">Write report</span><button class="del" aria-label="Delete Write report">Del</button></div>
          <div class="confirm" role="alertdialog" aria-label="Confirm delete folder Work">
            <span class="grow">Delete folder "Work"? Tasks move to General.</span>
            <button class="danger">Confirm</button>
            <button autofocus>Cancel</button>
          </div>
        </div>
      </main>
    </div>
  </div>
</body>
</html>
